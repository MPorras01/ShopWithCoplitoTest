# Datasource configurable for H2, PostgreSQL or compatible SQL engines.
# Example PostgreSQL values:
# DB_URL=jdbc:postgresql://localhost:5432/shopdb
# DB_USERNAME=postgres
# DB_PASSWORD=postgres
# DB_DRIVER=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Hibernate usually infers dialect from JDBC URL. Set only if needed.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT settings
app.jwt.secret=${JWT_SECRET:ReplaceThisWithAtLeast32CharactersSecretKey123}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Bootstrap admin user
app.bootstrap.admin.username=${ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${ADMIN_PASSWORD:admin123}